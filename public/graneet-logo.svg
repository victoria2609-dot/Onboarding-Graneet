<svg width="180" height="48" viewBox="0 0 180 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Graneet symbol: two groups of diagonal parallel strokes (scaffolding-inspired) -->
  <!-- Upper stroke pair -->
  <line x1="4" y1="30" x2="16" y2="10" stroke="#1A2A27" stroke-width="7.5" stroke-linecap="round"/>
  <line x1="15" y1="30" x2="27" y2="10" stroke="#1A2A27" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Lower stroke pair (offset down and right) -->
  <line x1="8" y1="42" x2="20" y2="22" stroke="#1A2A27" stroke-width="7.5" stroke-linecap="round"/>
  <line x1="19" y1="42" x2="31" y2="22" stroke="#1A2A27" stroke-width="7.5" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="44" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-weight="600" font-size="26" fill="#1A2A27" letter-spacing="-0.8">Graneet</text>
</svg>
